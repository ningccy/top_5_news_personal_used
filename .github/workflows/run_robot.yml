name: Financial News Robot

on:
  schedule:
    # 每天早上 8 點自動執行 (UTC 時間，約台灣下午 4 點)
    - cron: '0 8 * * *'
  workflow_dispatch: # 讓你可以手動點擊按鈕來執行

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install -- upgrade pip
          pip install -r requirements.txt

      - name: Run Crawler
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }} 
        run: |
          python -m pip install feedparser newspaper3k textblob pymongo certifi nltk
          python top_5_news_main.py
